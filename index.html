<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vellora - Privacy Policy</title>
    <meta name="description" content="Vellora privacy policy and information.">
    <style>
        :root {
            --primary: #06B6D4;
            --primary-dark: #0891B2;
            --bg: #0A0E14;
            --surface: #131820;
            --text: #F1F5F9;
            --text-secondary: #94A3B8;
            --accent: #F59E0B;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                         Oxygen, Ubuntu, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            text-align: center;
        }
        .logo-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 32px;
        }
        .logo-svg {
            width: 64px;
            height: 64px;
            color: var(--primary);
        }
        h1 {
            font-size: 48px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
        }
        .tagline {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 48px;
        }
        .links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .link-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 28px;
            background: var(--surface);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 10px;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s ease;
        }
        .link-button:hover {
            background: rgba(6, 182, 212, 0.1);
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .link-button.primary {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        .link-button.primary:hover {
            background: var(--primary-dark);
        }
        footer {
            position: absolute;
            bottom: 24px;
            color: var(--text-secondary);
            font-size: 13px;
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 36px;
            }
            .logo-svg {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-wrap">
            <svg class="logo-svg" viewBox="0 0 64 64" fill="none"
                 xmlns="http://www.w3.org/2000/svg">
                <path d="M8 24 Q20 14, 32 24 T 56 24"
                      stroke="currentColor" stroke-width="4"
                      stroke-linecap="round" fill="none"/>
                <path d="M8 40 Q20 30, 32 40 T 56 40"
                      stroke="currentColor" stroke-width="4"
                      stroke-linecap="round" fill="none"/>
                <circle cx="56" cy="24" r="3" fill="currentColor"/>
            </svg>
            <h1>Vellora</h1>
        </div>
        <p class="tagline">Emby client for Android &amp; Android TV</p>
        <div class="links">
            <a href="privacy-en.html" class="link-button primary">
                Privacy Policy (English)
            </a>
            <a href="privacy.html" class="link-button">
                Política de privacidad (Español)
            </a>
        </div>
    </div>
    <footer>
        &copy; 2026 Vellora &middot;
        <a href="mailto:velloradeveloper@outlook.com"
           style="color: var(--primary); text-decoration: none;">
            Contact
        </a>
    </footer>

    <script>
        // Auto-redirect based on browser language (only if no hash anchor)
        (function() {
            if (window.location.hash) return;
            var lang = (navigator.language || navigator.userLanguage || 'en')
                       .toLowerCase();
            // Don't auto-redirect if user clicks browser back to landing
            if (sessionStorage.getItem('vellora_landing_seen')) return;
            sessionStorage.setItem('vellora_landing_seen', '1');
            if (lang.startsWith('es')) {
                window.location.replace('privacy.html');
            } else {
                window.location.replace('privacy-en.html');
            }
        })();
    </script>
</body>
</html>
